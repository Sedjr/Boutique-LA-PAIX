name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }} # On laisse ça car l'action l'attend
          projectId: project-fff62a8c-78c9-42ce-bdf
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }} # C'est ton secret qui va tout débloquer
